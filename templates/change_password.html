<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>修改密碼 — ReStone 循環石材服務平台</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --stone-dark: #2C2826; --stone-pale: #F5F0EA;
      --accent: #8B6F47; --accent-hover: #6B5330;
      --text: #2C2826; --text-muted: #7A6A5A; --border: #E0D5C8;
      --sidebar-w: 220px;
    }
    body { font-family: 'Helvetica Neue', Arial, 'Noto Sans TC', sans-serif; background: #F0EDE8; color: var(--text); }

    .sidebar { position: fixed; top: 0; left: 0; bottom: 0; width: var(--sidebar-w); background: var(--stone-dark); color: white; display: flex; flex-direction: column; z-index: 200; }
    .sidebar-logo { padding: 1.5rem 1.2rem; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; gap: 10px; }
    .sidebar-logo-icon { width: 34px; height: 34px; flex-shrink: 0; }
    .sidebar-logo-text { font-size: 0.85rem; font-weight: 700; line-height: 1.3; }
    .sidebar-logo-sub { font-size: 0.65rem; opacity: 0.5; }
    .sidebar-nav { flex: 1; padding: 1rem 0; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 0.7rem 1.2rem; font-size: 0.85rem; color: rgba(255,255,255,0.65); text-decoration: none; transition: all 0.15s; border-left: 3px solid transparent; }
    .nav-item:hover { color: white; background: rgba(255,255,255,0.06); }
    .nav-item.active { color: white; background: rgba(139,111,71,0.2); border-left-color: var(--accent); }
    .nav-item .icon { font-size: 1rem; width: 20px; text-align: center; }
    .sidebar-footer { padding: 1rem 1.2rem; border-top: 1px solid rgba(255,255,255,0.1); font-size: 0.75rem; }
    .sidebar-footer .admin-name { color: rgba(255,255,255,0.8); font-weight: 600; margin-bottom: 4px; }
    .sidebar-footer a { color: rgba(255,255,255,0.4); text-decoration: none; font-size: 0.72rem; }

    .main-wrap { margin-left: var(--sidebar-w); min-height: 100vh; }
    .topbar { background: white; border-bottom: 1px solid var(--border); padding: 0 2rem; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .topbar-title { font-size: 1rem; font-weight: 700; }
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 0.55rem 1.1rem; border-radius: 7px; font-size: 0.85rem; font-weight: 600; cursor: pointer; text-decoration: none; border: none; transition: all 0.15s; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-secondary { background: var(--stone-pale); color: var(--text); border: 1px solid var(--border); }

    .content { padding: 2rem; }
    .flash { padding: 0.8rem 1.2rem; border-radius: 8px; margin-bottom: 1.5rem; font-size: 0.85rem; }
    .flash-success { background: #D1FAE5; border: 1px solid #A7F3D0; color: #065F46; }
    .flash-error { background: #FEE2E2; border: 1px solid #FECACA; color: #B91C1C; }

    .form-card { background: white; border-radius: 12px; border: 1px solid var(--border); max-width: 440px; }
    .form-card-header { padding: 1.2rem 1.5rem; border-bottom: 1px solid var(--border); font-size: 0.9rem; font-weight: 700; }
    .form-body { padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
    .form-group { display: flex; flex-direction: column; gap: 0.4rem; }
    label { font-size: 0.82rem; font-weight: 600; color: var(--text); }
    input[type="password"] { width: 100%; padding: 0.7rem 0.9rem; border: 1.5px solid var(--border); border-radius: 8px; font-size: 0.88rem; background: var(--stone-pale); outline: none; transition: border-color 0.2s; }
    input:focus { border-color: var(--accent); background: white; }
    .form-footer { padding: 1.2rem 1.5rem; border-top: 1px solid var(--border); display: flex; gap: 0.8rem; justify-content: flex-end; }
  </style>
</head>
<body>

<nav class="sidebar">
  <div class="sidebar-logo">
    <span class="sidebar-logo-icon">{% with size=34, sfx='sb' %}{% include '_logo.html' %}{% endwith %}</span>
    <div>
      <div class="sidebar-logo-text">ReStone 循環石材服務平台</div>
      <div class="sidebar-logo-sub">管理後台</div>
    </div>
  </div>
  <div class="sidebar-nav">
    <a href="/admin" class="nav-item"><span class="icon">▦</span> 石材管理</a>
    <a href="/admin/add" class="nav-item"><span class="icon">＋</span> 新增石材</a>
    <a href="/admin/change-password" class="nav-item active"><span class="icon">🔑</span> 修改密碼</a>
    <a href="/" class="nav-item" target="_blank"><span class="icon">↗</span> 前台預覽</a>
  </div>
  <div class="sidebar-footer">
    <div class="admin-name">👤 管理員</div>
    <a href="/admin/logout">登出 →</a>
  </div>
</nav>

<div class="main-wrap">
  <div class="topbar">
    <div class="topbar-title">修改密碼</div>
  </div>
  <div class="content">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash flash-{{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <div class="form-card">
      <div class="form-card-header">修改管理員密碼</div>
      <form method="post">
        <div class="form-body">
          <div class="form-group">
            <label>目前密碼</label>
            <input type="password" name="current_password" required placeholder="輸入目前密碼" />
          </div>
          <div class="form-group">
            <label>新密碼</label>
            <input type="password" name="new_password" required placeholder="至少 6 個字元" minlength="6" />
          </div>
          <div class="form-group">
            <label>確認新密碼</label>
            <input type="password" name="confirm_password" required placeholder="再次輸入新密碼" />
          </div>
        </div>
        <div class="form-footer">
          <a href="/admin" class="btn btn-secondary">取消</a>
          <button type="submit" class="btn btn-primary">更新密碼</button>
        </div>
      </form>
    </div>
  </div>
</div>

</body>
</html>
